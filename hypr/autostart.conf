exec-once = start_waybar_hyprland
exec-once = /usr/libexec/lxqt-policykit-agent
exec-once = waypaper --restore
#exec-once = ~/.config/hypr/scripts/autostart
exec-once = /usr/bin/nm-applet --indicator
exec-once = dunst
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store #Stores only image data
exec-once = /usr/bin/gnome-software --gapplication-service
exec-once = xdg-user-dirs-gtk-update
exec-once = xdg-user-dirs-update
exec-once = abrt-applet
exec-once = /usr/libexec/at-spi-bus-launcher --launch-immediately
exec = pidof hypridle || hypridle # Check ~/.config/hypr/hypridle.conf
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/bin/seapplet
exec-once = sway-audio-idle-inhibit
exec-once = systemctl --user start default.target
exec-once = flatpak run org.openrgb.OpenRGB --profile profile1
